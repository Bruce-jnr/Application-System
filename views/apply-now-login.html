<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admission Portal - Login</title>
    <link rel="stylesheet" href="/css/apply-now-login.css" />
    <link rel="icon" href="/images/logo1.png" type="image/icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.0.8/css/line.css"
    />
    <script src="/js/apply-now-login.js" defer></script>
  </head>
  <body>
    <div class="login-container">
      <header class="login-header">
        <img
          src="/images/logo1.png"
          alt="NSACoE Admission Portal Logo"
          class="login-logo"
        />
        <h1>Student Portal</h1>
        <p>
          Login with your serial number and PIN to start or continue your
          application.
        </p>
      </header>

      <form id="voucher-login-form">
        <div class="form-group">
          <label for="serial">Voucher Serial Number</label>
          <input
            type="text"
            id="serial"
            name="serial"
            placeholder="Enter serial number"
            required
          />
        </div>

        <div class="form-group">
          <label for="pin">Voucher PIN</label>
          <input
            type="password"
            id="pin"
            name="pin"
            placeholder="••••••••"
            required
          />
        </div>

        <button type="submit" id="submit-btn" class="btn-primary">Login</button>
        <div id="error-message" style="display: none;"></div>
      </form>
    </div>
  </body>
</html>
