<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voucher Print</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
            padding: 20px;
            margin: 0;
        }
        .voucher-container {
            background: white;
            border: 2px dashed #000;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .school-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .school-logo {
            max-width: 150px;
            margin-bottom: 15px;
        }
        .voucher-details {
            margin: 20px 0;
            font-size: 16px;
            line-height: 1.6;
        }
        .voucher-details p {
            margin: 10px 0;
        }
        .qr-code {
            text-align: center;
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #ddd;
            display: inline-block;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: #666;
        }
        .print-button {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        @media print {
            @page {
                size: A4;
                margin: 0;
            }
            body {
                margin: 0;
                padding: 0;
                background: white;
            }
            .voucher-container {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 20px;
                box-shadow: none;
                border: 2px dashed #000;
            }
            .print-button {
                display: none !important;
            }
            .school-header, .voucher-details, .qr-code, .footer {
                display: block !important;
                visibility: visible !important;
            }
            .school-logo {
                max-width: 120px;
            }
            .voucher-details {
                font-size: 14px;
            }
            .qr-code {
                border: 1px solid #000;
            }
        }
    </style>
</head>
<body>
    <button onclick="window.print()" class="btn btn-primary print-button">Print Voucher</button>
    
    <div class="voucher-container">
        <div class="school-header">
            <img src="/public/images/logo.png" alt="School Logo" class="school-logo">
            <h2>Admission Portal Voucher</h2>
        </div>
        
        <div class="voucher-details">
            <p><strong>Serial Number:</strong> <span id="serialNumber"></span></p>
            <p><strong>PIN:</strong> <span id="pin"></span></p>
            <p><strong>Date Generated:</strong> <span id="dateGenerated"></span></p>
            <p><strong>Valid Until:</strong> <span id="validUntil"></span></p>
        </div>
        
        <div class="qr-code" id="qrcode"></div>
        
        <div class="footer">
            <p>This voucher is required for the admission application process.</p>
            <p>Please keep this voucher safe and do not share it with others.</p>
        </div>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const serial = urlParams.get('serial');
        const pin = urlParams.get('pin');

        // Fetch voucher details
        async function fetchVoucherDetails() {
            try {
                const response = await fetch(`/api/vouchers/details?serial=${serial}&pin=${pin}`);
                const data = await response.json();
                
                if (data.success) {
                    // Populate voucher details
                    document.getElementById('serialNumber').textContent = data.voucher.serial_number;
                    document.getElementById('pin').textContent = data.voucher.pin;
                    document.getElementById('dateGenerated').textContent = new Date(data.voucher.created_at).toLocaleDateString();
                    document.getElementById('validUntil').textContent = new Date(data.voucher.expires_at).toLocaleDateString();

                    // Generate QR code
                    const qrData = `Serial: ${data.voucher.serial_number}\nPIN: ${data.voucher.pin}`;
                    QRCode.toCanvas(document.getElementById('qrcode'), qrData, {
                        width: 200,
                        margin: 1,
                        color: {
                            dark: '#000000',
                            light: '#ffffff'
                        }
                    });
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (error) {
                console.error('Error fetching voucher details:', error);
                alert('Error loading voucher details. Please try again.');
            }
        }

        // Load voucher details when page loads
        window.onload = fetchVoucherDetails;
    </script>
</body>
</html>
