<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NSACoE Admin - Settings</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">NSACoE Admin</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="/admin/dashboard">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/admin">Vouchers</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="/admin/settings">Settings</a>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <button
                class="nav-link btn btn-link"
                id="logoutBtn"
                style="color: white"
              >
                Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container my-4">
      <div id="alertHost"></div>

      <div class="row g-4">
        <div class="col-lg-6">
          <div class="card">
            <div class="card-header bg-white">
              <h5 class="mb-0">Voucher Price</h5>
            </div>
            <div class="card-body">
              <form id="voucherPriceForm" class="row g-2 align-items-end">
                <div class="col-12 col-md-8">
                  <label for="voucherPrice" class="form-label"
                    >Current price (GH₵)</label
                  >
                  <input
                    type="number"
                    class="form-control"
                    id="voucherPrice"
                    min="0"
                    step="0.01"
                    required
                  />
                </div>
                <div class="col-12 col-md-4 d-grid">
                  <button class="btn btn-primary" type="submit" id="savePriceBtn">
                    Save
                  </button>
                </div>
                <div class="col-12">
                  <small class="text-muted">
                    This sets the price stored with newly generated vouchers.
                  </small>
                </div>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="card">
            <div class="card-header bg-white">
              <h5 class="mb-0">Vendor API Keys</h5>
            </div>
            <div class="card-body">
              <div class="mb-3">
                <label for="vendorSelect" class="form-label">Select vendor</label>
                <select class="form-select" id="vendorSelect">
                  <option value="">Loading vendors...</option>
                </select>
              </div>

              <div class="table-responsive">
                <table class="table table-sm align-middle">
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th>Status</th>
                      <th>Created</th>
                      <th>Last used</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="apiKeysTbody">
                    <tr>
                      <td colspan="5" class="text-muted">Select a vendor.</td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <small class="text-muted">
                Suspending a key sets <code>is_active = false</code> so it can’t
                generate vouchers anymore.
              </small>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/admin-settings.js"></script>
  </body>
</html>
