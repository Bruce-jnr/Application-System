<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Portal - Login</title>
    <link rel="stylesheet" href="/css/admin-login.css" />
    <link rel="icon" href="/images/logo1.png" type="image/icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="login-container">
      <header class="login-header">
        <img
          src="/images/logo1.png"
          alt="School Logo"
          class="login-logo"
        />
        <h3>Administrative Access</h3>
      </header>
      <form id="loginForm">
        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <input
            type="text"
            class="form-control"
            id="username"
            placeholder="Enter admin username"
            required
          />
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="••••••••"
            required
          />
        </div>
        <button type="submit" class="btn-login">Login to Dashboard</button>
      </form>
    </div>

    <script>
      // Helper function to get the correct API base URL.
      // Use the current origin (same-origin) to avoid cross-site cookie issues.
      function getApiBaseUrl() {
        return window.location.origin;
      }

      // Debug: Check if page loaded properly
      console.log('Admin login page loaded');
      console.log('Form element:', document.getElementById('loginForm'));

      // Test basic connectivity
      fetch('/api/admin/check-session', { credentials: 'include' })
        .then((response) => {
          console.log('Basic connectivity test - Status:', response.status);
        })
        .catch((error) => {
          console.log('Basic connectivity test failed:', error);
        });

      function setAdminToken(token) {
        localStorage.setItem('admin_token', token);
      }

      document
        .getElementById('loginForm')
        .addEventListener('submit', async (e) => {
          e.preventDefault();
          console.log('Form submitted');

          const username = document.getElementById('username').value;
          const password = document.getElementById('password').value;
          console.log(
            'Username:',
            username,
            'Password length:',
            password.length
          );

          // Show loading state
          const submitBtn = e.target.querySelector('button[type="submit"]');
          const originalText = submitBtn.textContent;
          submitBtn.textContent = 'Logging in...';
          submitBtn.disabled = true;

          try {
            // Use helper function to get correct API URL
            const apiUrl = getApiBaseUrl() + '/api/admin/login';
            console.log('Current location:', window.location.href);
            console.log('Current origin:', window.location.origin);
            console.log('Current hostname:', window.location.hostname);
            console.log('Making login request to:', apiUrl);

            let response;
            try {
              response = await fetch(apiUrl, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                },
                credentials: 'include',
                body: JSON.stringify({ username, password }),
              });
            } catch (fetchError) {
              console.log(
                'Primary fetch failed, trying alternative approach:',
                fetchError
              );

              // If we're on app.nsacoe.edu.gh and it failed, try the main domain
              if (window.location.hostname === 'app.nsacoe.edu.gh') {
                const fallbackUrl = 'https://nsacoe.edu.gh/api/admin/login';
                console.log('Trying fallback URL:', fallbackUrl);
                response = await fetch(fallbackUrl, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                  },
                  credentials: 'include',
                  body: JSON.stringify({ username, password }),
                });
              } else {
                // For other domains, try same-domain
                const fallbackUrl = window.location.origin + '/api/admin/login';
                console.log('Trying same-domain fallback URL:', fallbackUrl);
                response = await fetch(fallbackUrl, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                  },
                  credentials: 'include',
                  body: JSON.stringify({ username, password }),
                });
              }
            }

            console.log('Login response status:', response.status);
            console.log(
              'Login response headers:',
              Object.fromEntries(response.headers.entries())
            );

            // Allow 400 or 401 status to pass through to read error message
            if (!response.ok && response.status !== 400 && response.status !== 401 && response.status !== 404) {
              throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();
            console.log('Login response data:', data);

            if (data.success) {
              if (data.token) setAdminToken(data.token);
              console.log('Login successful, redirecting to admin...');
              window.location.href = '/admin/dashboard';
            } else {
              // Now accurately detects and alerts data.message instead of breaking
              alert(data.message || 'Login failed!');
            }
          } catch (error) {
            console.error('Login error:', error);
            alert(
              'Error during login: ' +
                error.message +
                '. Please check your connection and try again.'
            );
          } finally {
            // Reset button state
            submitBtn.textContent = originalText;
            submitBtn.disabled = false;
          }
        });
    </script>
  </body>
</html>
